spring.application.name=lias-backend

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/lias_db?currentSchema=public
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Debugging — membership approval flow
logging.level.com.lias.lias_backend.controller.MembershipRequestController=DEBUG
logging.level.com.lias.lias_backend.service.impl.MembershipRequestServiceImpl=DEBUG
logging.level.org.springframework.transaction=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
lias.upload.dir=./uploads

# Security JWT Configuration
lias.jwt.secret=9a4f2c8d3b7a1e5f8c2d9a6b3f7e1a5c8d2f9b6a3e7f1c5d8a2b9f6c3d7e1f5a
lias.jwt.expiration-ms=86400000

# Server Port
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

# Zid had jouj stoura bach t7el mochkil dyal "connection closed"
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.datasource.hikari.keepalive-time=40000

spring.datasource.hikari.connection-timeout=60000