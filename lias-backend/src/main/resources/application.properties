spring.application.name=lias-backend

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/lias_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
lias.upload.dir=./uploads

# Security JWT Configuration
lias.jwt.secret=9a4f2c8d3b7a1e5f8c2d9a6b3f7e1a5c8d2f9b6a3e7f1c5d8a2b9f6c3d7e1f5a
lias.jwt.expiration-ms=86400000

# Server Port
server.port=8080
